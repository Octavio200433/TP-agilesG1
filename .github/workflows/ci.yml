name: CI/CD Pipeline - Ahorcado

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # 2. Configurar Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    # 3. Configurar pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    # 4. Forzar eliminación de configuraciones conflictivas en el servidor
    - name: Clean runner environment
      run: |
        rm -f pnpm-workspace.yaml
        rm -f ../pnpm-workspace.yaml
      continue-on-error: true

    # 5. Instalar dependencias en el subdirectorio real
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      working-directory: ./TP-agilesG1

    # 6. ETAPA 1: Compilar el proyecto
    - name: Compile / Build
      run: pnpm build
      working-directory: ./TP-agilesG1

    # 7. ETAPA 2 y 3: Unit Tests y Reporte de Cobertura
    - name: Run Unit Tests & Coverage (Vitest)
      run: pnpm test -- --run
      working-directory: ./TP-agilesG1

    # 8. ETAPA 4: Análisis Estático (SonarQube Cloud)
    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      with:
        projectBaseDir: ./TP-agilesG1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # 9. Descargar los navegadores para Playwright/Cucumber
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps chromium
      working-directory: ./TP-agilesG1

    # 10. ETAPA 5: Acceptance Tests (Cucumber)
    - name: Run Acceptance Tests (Cucumber)
      run: pnpm at
      working-directory: ./TP-agilesG1

    # 11. ETAPA 6: Deploy Automático a GitHub Pages
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && success()
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: TP-agilesG1/dist
        branch: gh-pages